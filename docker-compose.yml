services:
  # PostgreSQL — event storage
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: argus
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis — real-time state and caching
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ClickHouse — columnar store for the raw syscall firehose + correlated
  # traces (SPEC_04). Postgres keeps only findings; ClickHouse holds the
  # high-volume, time-bounded forensic record.
  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    environment:
      CLICKHOUSE_DB: argus
      CLICKHOUSE_USER: argus
      CLICKHOUSE_PASSWORD: argus_dev
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"
      - "9000:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - chdata:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8123/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Tetragon — eBPF-based runtime security observability
  # Runs privileged to access the kernel's eBPF subsystem
  tetragon:
    image: quay.io/cilium/tetragon:v1.1.2
    privileged: true
    pid: host
    volumes:
      - /sys/kernel:/sys/kernel
      - ./data/tetragon:/var/run/tetragon
      - ./policies:/etc/tetragon/tetragon.tp.d
    command:
      - tetragon
      - --export-filename=/var/run/tetragon/tetragon.log
      - --tracing-policy-dir=/etc/tetragon/tetragon.tp.d
      - --export-denylist={"binary_regex":["runc","containerd","dockerd","pg_isready","redis-cli"]}

  # Ingestion — tails Tetragon's export file and stores events in Postgres/Redis.
  # File mode (not gRPC) because compose-mode Tetragon exports to a mounted log file.
  ingestion:
    build:
      context: .
      dockerfile: packages/ingestion/Dockerfile
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: argus
      DB_USER: argus
      DB_PASSWORD: argus_dev
      REDIS_HOST: redis
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_DB: argus
      CLICKHOUSE_USER: argus
      CLICKHOUSE_PASSWORD: argus_dev
      TETRAGON_MODE: file
      TETRAGON_EXPORT_PATH: /var/run/tetragon/tetragon.log
    volumes:
      # Read Tetragon's export file (Tetragon writes it via the same host dir)
      - ./data/tetragon:/var/run/tetragon:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      tetragon:
        condition: service_started

  # API — REST + WebSocket live-stream over the events Postgres stores.
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    environment:
      API_PORT: "3001"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: argus
      DB_USER: argus
      DB_PASSWORD: argus_dev
      REDIS_HOST: redis
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_DB: argus
      CLICKHOUSE_USER: argus
      CLICKHOUSE_PASSWORD: argus_dev
      # Single-host demo: opt into private-mesh de-noise (RFC1918 LOW). Link-local
      # and public egress stay HIGH; the shipped default profile stays conservative.
      ARGUS_SENSITIVITY_PROFILE: demo
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Demo chatbot agent (SPEC_03) — tool-using, weakly-guarded, Argus-instrumented.
  # Inherits the Slice 2 wiring: pid: host so its host PID is what Tetragon
  # captures, and blank ARGUS_POD_NAME so the correlator keys on that host PID.
  # Bring-your-own LLM key via .env (GROQ_API_KEY or ANTHROPIC_API_KEY).
  agent:
    build:
      context: .
      dockerfile: packages/agent/Dockerfile
    pid: host
    environment:
      AGENT_PORT: "4001"
      ARGUS_API_URL: http://api:3001
      ARGUS_POD_NAME: ""
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "4001:4001"
    depends_on:
      api:
        condition: service_healthy
      tetragon:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4001/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Demo dashboard (SPEC_03) — the chat + live-Argus page. The browser runs on
  # the host and reaches the published api/agent ports, so the NEXT_PUBLIC_*
  # defaults (localhost:3001/:4001) are correct; no build args needed.
  dashboard:
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/demo || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Sample AI agent — instrumented with Argus SDK.
  # Compose-mode correlation (SPEC_03 T2): run in the host PID namespace so the
  # SDK's os.getpid() reports the *host* PID that Tetragon captures — exact-match
  # correlation then works without the container-PID gap (D15). With no k8s pod
  # metadata in compose, ARGUS_POD_NAME is blanked so the correlator keys on the
  # host PID (it would otherwise inherit the container id via HOSTNAME and key on
  # a pod_name that no compose-mode event carries).
  sample-agent:
    build:
      context: .
      dockerfile: sample-agent/Dockerfile
    pid: host
    environment:
      ARGUS_API_URL: http://host.docker.internal:3001
      ARGUS_POD_NAME: ""
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - agent

volumes:
  pgdata:
  chdata:
