# Kind cluster config for Argus
# Tetragon needs access to kernel tracing facilities (eBPF)
# Kind runs a Linux VM inside Docker Desktop, so eBPF works on macOS
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    # Extra mounts needed for Tetragon eBPF programs
    extraMounts:
      # Kernel BTF (BPF Type Format) — needed for CO-RE eBPF programs
      - hostPath: /sys/kernel/btf
        containerPath: /sys/kernel/btf
        readOnly: true
