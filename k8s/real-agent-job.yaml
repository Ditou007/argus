# Real AI agent — security research assistant with LLM calls
# Set your API key before applying:
#   kubectl create secret generic llm-keys --from-literal=ANTHROPIC_API_KEY=sk-ant-...
#   OR
#   kubectl create secret generic llm-keys --from-literal=GROQ_API_KEY=gsk_...
#   OR
#   kubectl create secret generic llm-keys --from-literal=GEMINI_API_KEY=AI...
#
# Then run:
#   kubectl delete job real-agent --ignore-not-found && kubectl apply -f k8s/real-agent-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: real-agent
  labels:
    app: real-agent
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: real-agent
        argus.dev/track: "true"
    spec:
      restartPolicy: Never
      containers:
        - name: agent
          image: argus-sample-agent:local
          imagePullPolicy: Never
          command: ["python", "-u", "real_agent.py"]
          env:
            - name: ARGUS_API_URL
              value: "http://argus-api:3001"
            - name: ARGUS_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          envFrom:
            - secretRef:
                name: llm-keys
                optional: true
