# TracingPolicy CRD: track file operations in tracked agent pods.
# Pod-scoped (SPEC_02 T1b): scoped by the `argus.dev/track: "true"` pod label
# instead of a python/node binary allowlist — so a spawned tool's file activity
# (e.g. an undeclared `curl`/`sh`) is captured too, not just the agent binary.
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: file-tracking
spec:
  podSelector:
    matchLabels:
      argus.dev/track: "true"
  kprobes:
    - call: "fd_install"
      syscall: false
      args:
        - index: 0
          type: int
        - index: 1
          type: "file"
    - call: "sys_write"
      syscall: true
      args:
        # The fd as a raw int — Tetragon's "fd" type resolved to empty here, so we
        # capture the number and resolve it to a path via fd_install (D14 resolver).
        - index: 0
          type: "int"
        - index: 2
          type: "size_t"
