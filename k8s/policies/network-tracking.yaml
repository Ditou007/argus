# TracingPolicy CRD: track network operations in tracked agent pods.
# Pod-scoped (SPEC_02 T1b): scoped by the `argus.dev/track: "true"` pod label
# instead of a python/node binary allowlist — so a spawned tool's connections
# (e.g. an undeclared `curl` exfil) are captured too, not just the agent binary.
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: network-tracking
spec:
  podSelector:
    matchLabels:
      argus.dev/track: "true"
  kprobes:
    - call: "tcp_connect"
      syscall: false
      args:
        - index: 0
          type: "sock"
    - call: "tcp_sendmsg"
      syscall: false
      args:
        - index: 0
          type: "sock"
        - index: 2
          type: "int"
