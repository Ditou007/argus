# Argus API — REST endpoints for events, sessions, correlation
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argus-api
  labels:
    app: argus-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: argus-api
  template:
    metadata:
      labels:
        app: argus-api
    spec:
      containers:
        - name: api
          image: argus-api:local
          imagePullPolicy: Never  # Image loaded via `kind load`
          ports:
            - containerPort: 3001
          env:
            - name: API_PORT
              value: "3001"
            - name: DB_HOST
              value: postgres      # K8s Service DNS
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: argus
            - name: DB_USER
              value: argus
            - name: DB_PASSWORD
              value: argus_dev
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: argus-api
spec:
  selector:
    app: argus-api
  ports:
    - port: 3001
      targetPort: 3001
