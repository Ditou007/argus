apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: "network-tracking"
spec:
  kprobes:
    - call: "tcp_connect"
      syscall: false
      args:
        - index: 0
          type: "sock"
      selectors:
        - matchBinaries:
            - operator: "In"
              values:
                - "/usr/local/bin/python"
                - "/usr/local/bin/python3"
                - "/usr/bin/python"
                - "/usr/bin/python3"
                - "/usr/bin/node"
                - "/usr/local/bin/node"
    - call: "tcp_sendmsg"
      syscall: false
      args:
        - index: 0
          type: "sock"
        - index: 2
          type: "int"
      selectors:
        - matchBinaries:
            - operator: "In"
              values:
                - "/usr/local/bin/python"
                - "/usr/local/bin/python3"
                - "/usr/bin/python"
                - "/usr/bin/python3"
                - "/usr/bin/node"
                - "/usr/local/bin/node"
